<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#12182b"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="policy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="kernel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#be123c"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 28px 'SF Pro Display', 'Segoe UI', sans-serif; fill: #f8fafc; }
      .sub { font: 400 14px 'SF Pro Text', 'Segoe UI', sans-serif; fill: #94a3b8; }
      .layer { font: 700 16px 'SF Pro Display', 'Segoe UI', sans-serif; fill: #fff; }
      .box { font: 600 13px 'SF Pro Text', 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .small { font: 400 11px 'SF Pro Text', 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .cap { font: 600 11px 'SF Mono', Menlo, monospace; fill: #a5b4fc; }
      .note { font: 400 12px 'SF Pro Text', 'Segoe UI', sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="1400" height="1100" fill="url(#bg)"/>
  <text x="48" y="48" class="title">GrokOS — System Architecture (Linux path)</text>
  <text x="48" y="72" class="sub">Agent-first · security-first · glibc · Wayland · packaged browser · grok-policyd · multi-arch staged</text>

  <!-- Layer 7: UX / Intent -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="1320" height="100" rx="14" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="60" y="128" class="layer">L7  Intent &amp; Personalization</text>
  <rect x="60" y="142" width="240" height="40" rx="8" fill="url(#agent)"/>
  <text x="78" y="167" class="box">NL Launcher / Prompt</text>
  <rect x="320" y="142" width="260" height="40" rx="8" fill="#312e81"/>
  <text x="338" y="167" class="box">Imagine wallpaper / theme</text>
  <rect x="600" y="142" width="220" height="40" rx="8" fill="#312e81"/>
  <text x="618" y="167" class="box">Voice (optional STT)</text>
  <rect x="840" y="142" width="240" height="40" rx="8" fill="#312e81"/>
  <text x="858" y="167" class="box">Settings as dialogue</text>
  <rect x="1100" y="142" width="230" height="40" rx="8" fill="#312e81"/>
  <text x="1118" y="167" class="box">Session memory UI</text>

  <!-- Layer 6: Shell surfaces -->
  <g filter="url(#shadow)">
    <rect x="40" y="220" width="1320" height="110" rx="14" fill="#0c1929" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="60" y="248" class="layer">L6  Shell Surfaces (equal citizens)</text>
  <rect x="60" y="262" width="300" height="48" rx="8" fill="url(#shell)"/>
  <text x="78" y="282" class="box">Wayland Compositor</text>
  <text x="78" y="298" class="small">wlroots / niri-class · portals</text>
  <rect x="380" y="262" width="280" height="48" rx="8" fill="#1e3a5f"/>
  <text x="398" y="282" class="box">Terminal (foot/alacritty)</text>
  <text x="398" y="298" class="small">+ embedded grok TUI</text>
  <rect x="680" y="262" width="300" height="48" rx="8" fill="#1e3a5f"/>
  <text x="698" y="282" class="box">Browser (packaged Chromium)</text>
  <text x="698" y="298" class="small">agent-controlled CDP/WebDriver</text>
  <rect x="1000" y="262" width="330" height="48" rx="8" fill="#1e3a5f"/>
  <text x="1018" y="282" class="box">Skills / App ABI host</text>
  <text x="1018" y="298" class="small">plugins · MCP · optional Starlight</text>

  <!-- Layer 5: Agent runtime -->
  <g filter="url(#shadow)">
    <rect x="40" y="350" width="1320" height="120" rx="14" fill="#1a1030" stroke="#a855f7" stroke-width="2"/>
  </g>
  <text x="60" y="378" class="layer">L5  Agent Runtime (fork of Grok Build + OS integration)</text>
  <rect x="60" y="392" width="200" height="56" rx="8" fill="url(#agent)"/>
  <text x="78" y="416" class="box">Agent loop</text>
  <text x="78" y="432" class="small">tools · subagents</text>
  <rect x="280" y="392" width="200" height="56" rx="8" fill="#4c1d95"/>
  <text x="298" y="416" class="box">Tool hub</text>
  <text x="298" y="432" class="small">computer-hub · MCP</text>
  <rect x="500" y="392" width="200" height="56" rx="8" fill="#4c1d95"/>
  <text x="518" y="416" class="box">Memory</text>
  <text x="518" y="432" class="small">session + global</text>
  <rect x="720" y="392" width="200" height="56" rx="8" fill="#4c1d95"/>
  <text x="738" y="416" class="box">Skills engine</text>
  <text x="738" y="432" class="small">signed packs</text>
  <rect x="940" y="392" width="200" height="56" rx="8" fill="#4c1d95"/>
  <text x="958" y="416" class="box">Model client</text>
  <text x="958" y="432" class="small">Grok API / local</text>
  <rect x="1160" y="392" width="170" height="56" rx="8" fill="#4c1d95"/>
  <text x="1178" y="416" class="box">Audit export</text>
  <text x="1178" y="432" class="small">opt-in traces</text>

  <!-- Layer 4: Policy - THE HARD BOUNDARY -->
  <g filter="url(#shadow)">
    <rect x="40" y="490" width="1320" height="130" rx="14" fill="#052e1c" stroke="#10b981" stroke-width="3"/>
  </g>
  <text x="60" y="518" class="layer">L4  grok-policyd  ★ non-LLM TCB — model proposes, policy disposes</text>
  <rect x="60" y="532" width="190" height="64" rx="8" fill="url(#policy)"/>
  <text x="78" y="556" class="box">Capability</text>
  <text x="78" y="572" class="small">tokens / roles</text>
  <rect x="270" y="532" width="190" height="64" rx="8" fill="#065f46"/>
  <text x="288" y="556" class="box">Sandbox driver</text>
  <text x="288" y="572" class="small">Landlock·seccomp·bwrap</text>
  <rect x="480" y="532" width="190" height="64" rx="8" fill="#065f46"/>
  <text x="498" y="556" class="box">Consent UX</text>
  <text x="498" y="572" class="small">HITL elevated ops</text>
  <rect x="690" y="532" width="190" height="64" rx="8" fill="#065f46"/>
  <text x="708" y="556" class="box">Audit log</text>
  <text x="708" y="572" class="small">append-only JSONL</text>
  <rect x="900" y="532" width="190" height="64" rx="8" fill="#065f46"/>
  <text x="918" y="556" class="box">Content guard</text>
  <text x="918" y="572" class="small">stego / untrusted media</text>
  <rect x="1110" y="532" width="220" height="64" rx="8" fill="#065f46"/>
  <text x="1128" y="556" class="box">Network policy</text>
  <text x="1128" y="572" class="small">egress allowlists</text>

  <!-- Layer 3: System services -->
  <g filter="url(#shadow)">
    <rect x="40" y="640" width="1320" height="100" rx="14" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="60" y="668" class="layer">L3  System Services (userspace)</text>
  <rect x="60" y="682" width="160" height="40" rx="8" fill="#78350f"/>
  <text x="78" y="707" class="box">systemd</text>
  <rect x="240" y="682" width="160" height="40" rx="8" fill="#78350f"/>
  <text x="258" y="707" class="box">NetworkManager</text>
  <rect x="420" y="682" width="140" height="40" rx="8" fill="#78350f"/>
  <text x="438" y="707" class="box">PipeWire</text>
  <rect x="580" y="682" width="140" height="40" rx="8" fill="#78350f"/>
  <text x="598" y="707" class="box">dbus / portals</text>
  <rect x="740" y="682" width="160" height="40" rx="8" fill="#78350f"/>
  <text x="758" y="707" class="box">podman / OCI</text>
  <rect x="920" y="682" width="160" height="40" rx="8" fill="#78350f"/>
  <text x="938" y="707" class="box">update / ostree</text>
  <rect x="1100" y="682" width="230" height="40" rx="8" fill="#78350f"/>
  <text x="1118" y="707" class="box">package mgr (dnf/apt)</text>

  <!-- Layer 2: Userspace base -->
  <g filter="url(#shadow)">
    <rect x="40" y="760" width="1320" height="90" rx="14" fill="#292524" stroke="#a8a29e" stroke-width="2"/>
  </g>
  <text x="60" y="788" class="layer">L2  Userspace Base</text>
  <rect x="60" y="802" width="200" height="32" rx="6" fill="#44403c"/>
  <text x="78" y="823" class="box">glibc (not musl v1)</text>
  <rect x="280" y="802" width="180" height="32" rx="6" fill="#44403c"/>
  <text x="298" y="823" class="box">GNU coreutils</text>
  <rect x="480" y="802" width="180" height="32" rx="6" fill="#44403c"/>
  <text x="498" y="823" class="box">LLVM / GCC toolchain</text>
  <rect x="680" y="802" width="200" height="32" rx="6" fill="#44403c"/>
  <text x="698" y="823" class="box">Mesa / DRM / Vulkan</text>
  <rect x="900" y="802" width="200" height="32" rx="6" fill="#44403c"/>
  <text x="918" y="823" class="box">fonts / i18n / PAM</text>
  <rect x="1120" y="802" width="210" height="32" rx="6" fill="#44403c"/>
  <text x="1138" y="823" class="box">minimal package set</text>

  <!-- Layer 1: Kernel -->
  <g filter="url(#shadow)">
    <rect x="40" y="870" width="1320" height="90" rx="14" fill="#3f0d1c" stroke="#fb7185" stroke-width="2"/>
  </g>
  <text x="60" y="898" class="layer">L1  Linux Kernel (upstream + config, not greenfield)</text>
  <rect x="60" y="912" width="150" height="32" rx="6" fill="url(#kernel)"/>
  <text x="78" y="933" class="box">LTS kernel</text>
  <rect x="230" y="912" width="150" height="32" rx="6" fill="#881337"/>
  <text x="248" y="933" class="box">Landlock LSM</text>
  <rect x="400" y="912" width="140" height="32" rx="6" fill="#881337"/>
  <text x="418" y="933" class="box">seccomp</text>
  <rect x="560" y="912" width="140" height="32" rx="6" fill="#881337"/>
  <text x="578" y="933" class="box">namespaces</text>
  <rect x="720" y="912" width="140" height="32" rx="6" fill="#881337"/>
  <text x="738" y="933" class="box">KVM / nested</text>
  <rect x="880" y="912" width="160" height="32" rx="6" fill="#881337"/>
  <text x="898" y="933" class="box">secure boot path</text>
  <rect x="1060" y="912" width="270" height="32" rx="6" fill="#881337"/>
  <text x="1078" y="933" class="box">arch: x86_64 → aarch64 → …</text>

  <!-- Footer tracks -->
  <text x="48" y="1000" class="cap">TRACKS:  T-DISTRO (Bernhard)  ·  T-SECURITY (Ali + Eric research)  ·  T-RUNTIME (Paul)  ·  T-SHELL/ABI (Bernardo)  ·  T-INFRA (Paul)  ·  T-MOBILE later (optional Android single-device)</text>
  <text x="48" y="1028" class="note">Non-goals v1: custom kernel, musl-as-dogma, self-built Chromium, multi-OEM Android, Debian-scale consensus, BTC in base image, wallpaper marketing packs.</text>
  <text x="48" y="1052" class="note">Artifacts: qcow2 + ISO (x86_64) · signed packages · policy fixtures · opt-in eval traces · optional Starlight as userspace app.</text>
  <text x="48" y="1076" class="note">GrokOS planning graphic · 2026-07-22 · companion to GROKOS_FULL_ROADMAP.md</text>
</svg>
